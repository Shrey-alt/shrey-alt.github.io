<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ux-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5EFE3"/>
      <stop offset="100%" stop-color="#E8DFCD"/>
    </linearGradient>
    <filter id="ux-paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.85
                             0 0 0 0 0.78
                             0 0 0 0 0.65
                             0 0 0 0.06 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="ux-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Paper background -->
  <rect width="800" height="800" fill="url(#ux-bg)"/>
  <rect width="800" height="800" filter="url(#ux-paper)"/>

  <!-- Faint grid (graph paper) -->
  <g stroke="#1d1d1d" stroke-opacity="0.05" stroke-width="1">
    <g>
      <line x1="0" y1="80" x2="800" y2="80"/>
      <line x1="0" y1="160" x2="800" y2="160"/>
      <line x1="0" y1="240" x2="800" y2="240"/>
      <line x1="0" y1="320" x2="800" y2="320"/>
      <line x1="0" y1="400" x2="800" y2="400"/>
      <line x1="0" y1="480" x2="800" y2="480"/>
      <line x1="0" y1="560" x2="800" y2="560"/>
      <line x1="0" y1="640" x2="800" y2="640"/>
      <line x1="0" y1="720" x2="800" y2="720"/>
    </g>
    <g>
      <line x1="80" y1="0" x2="80" y2="800"/>
      <line x1="160" y1="0" x2="160" y2="800"/>
      <line x1="240" y1="0" x2="240" y2="800"/>
      <line x1="320" y1="0" x2="320" y2="800"/>
      <line x1="400" y1="0" x2="400" y2="800"/>
      <line x1="480" y1="0" x2="480" y2="800"/>
      <line x1="560" y1="0" x2="560" y2="800"/>
      <line x1="640" y1="0" x2="640" y2="800"/>
      <line x1="720" y1="0" x2="720" y2="800"/>
    </g>
  </g>

  <!-- Phone wireframe (centre-left) -->
  <g filter="url(#ux-shadow)">
    <rect x="160" y="180" width="280" height="500" rx="36" fill="#FFFCF6" stroke="#1d1d1d" stroke-width="2.5"/>
    <!-- Notch -->
    <rect x="270" y="200" width="60" height="10" rx="5" fill="#1d1d1d" opacity="0.15"/>
    <!-- Status bar -->
    <line x1="180" y1="240" x2="420" y2="240" stroke="#1d1d1d" stroke-opacity="0.18" stroke-width="1.5"/>
    <!-- Header block -->
    <rect x="190" y="260" width="120" height="14" rx="3" fill="#1d1d1d" opacity="0.65"/>
    <rect x="190" y="282" width="200" height="8" rx="3" fill="#1d1d1d" opacity="0.25"/>
    <!-- Hero card -->
    <rect x="190" y="316" width="220" height="90" rx="10" fill="#1d1d1d" opacity="0.08" stroke="#1d1d1d" stroke-width="1.5" stroke-dasharray="0"/>
    <line x1="206" y1="346" x2="290" y2="346" stroke="#1d1d1d" stroke-opacity="0.45" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="206" y1="362" x2="280" y2="362" stroke="#1d1d1d" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
    <line x1="206" y1="376" x2="240" y2="376" stroke="#1d1d1d" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
    <!-- 4 quick action cells -->
    <g>
      <rect x="190" y="424" width="48" height="48" rx="8" fill="none" stroke="#1d1d1d" stroke-width="1.5"/>
      <rect x="246" y="424" width="48" height="48" rx="8" fill="none" stroke="#1d1d1d" stroke-width="1.5"/>
      <rect x="302" y="424" width="48" height="48" rx="8" fill="none" stroke="#1d1d1d" stroke-width="1.5"/>
      <rect x="358" y="424" width="48" height="48" rx="8" fill="#1d1d1d" opacity="0.85"/>
    </g>
    <!-- List rows -->
    <g>
      <rect x="190" y="490" width="220" height="40" rx="8" fill="none" stroke="#1d1d1d" stroke-width="1.4"/>
      <circle cx="208" cy="510" r="9" fill="none" stroke="#1d1d1d" stroke-width="1.4"/>
      <line x1="226" y1="505" x2="380" y2="505" stroke="#1d1d1d" stroke-opacity="0.35" stroke-width="2"/>
      <line x1="226" y1="515" x2="340" y2="515" stroke="#1d1d1d" stroke-opacity="0.18" stroke-width="2"/>
    </g>
    <g>
      <rect x="190" y="540" width="220" height="40" rx="8" fill="none" stroke="#1d1d1d" stroke-width="1.4"/>
      <circle cx="208" cy="560" r="9" fill="none" stroke="#1d1d1d" stroke-width="1.4"/>
      <line x1="226" y1="555" x2="370" y2="555" stroke="#1d1d1d" stroke-opacity="0.35" stroke-width="2"/>
      <line x1="226" y1="565" x2="320" y2="565" stroke="#1d1d1d" stroke-opacity="0.18" stroke-width="2"/>
    </g>
    <!-- CTA button -->
    <rect x="190" y="608" width="220" height="42" rx="10" fill="#1d1d1d"/>
    <line x1="270" y1="629" x2="320" y2="629" stroke="#FFFCF6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="328" y1="623" x2="338" y2="629" stroke="#FFFCF6" stroke-width="2" stroke-linecap="round"/>
    <line x1="328" y1="635" x2="338" y2="629" stroke="#FFFCF6" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Annotation: arrow + label (top-right) -->
  <g stroke="#C2410C" fill="none" stroke-linecap="round">
    <path d="M 530 220 Q 600 240 540 290" stroke-width="2.2"/>
    <path d="M 530 285 L 540 290 L 532 297" stroke-width="2.2"/>
  </g>
  <text x="540" y="200" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#C2410C">primary CTA</text>

  <!-- Annotation: circle around 4-cell grid + label -->
  <g stroke="#0F766E" fill="none">
    <ellipse cx="298" cy="448" rx="130" ry="38" stroke-width="2" stroke-dasharray="5 5"/>
  </g>
  <text x="470" y="455" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#0F766E">quick actions</text>

  <!-- Flow node graph (right side) -->
  <g>
    <!-- Node 1 -->
    <circle cx="600" cy="370" r="28" fill="#1d1d1d"/>
    <text x="600" y="377" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="13" font-weight="700" fill="#FFFCF6">1</text>
    <text x="600" y="420" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="12" font-weight="600" fill="#1d1d1d" opacity="0.7">DISCOVER</text>

    <!-- Connector -->
    <line x1="600" y1="442" x2="600" y2="498" stroke="#1d1d1d" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="4 6"/>

    <!-- Node 2 -->
    <circle cx="600" cy="520" r="28" fill="none" stroke="#1d1d1d" stroke-width="2.5"/>
    <text x="600" y="527" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="13" font-weight="700" fill="#1d1d1d">2</text>
    <text x="600" y="570" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="12" font-weight="600" fill="#1d1d1d" opacity="0.7">DEFINE</text>

    <!-- Connector -->
    <line x1="600" y1="592" x2="600" y2="648" stroke="#1d1d1d" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="4 6"/>

    <!-- Node 3 -->
    <circle cx="600" cy="670" r="28" fill="none" stroke="#1d1d1d" stroke-width="2.5"/>
    <text x="600" y="677" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="13" font-weight="700" fill="#1d1d1d">3</text>
  </g>

  <!-- Top-left label -->
  <text x="80" y="100" font-family="DM Sans, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#1d1d1d" opacity="0.55">USER EXPERIENCE</text>
  <line x1="80" y1="116" x2="240" y2="116" stroke="#1d1d1d" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="80" y="148" font-family="Georgia, serif" font-style="italic" font-size="34" fill="#1d1d1d">Wireframes &amp; flows.</text>

  <!-- Bottom signature line -->
  <text x="80" y="740" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" letter-spacing="2" fill="#1d1d1d" opacity="0.4">SKETCH · ITERATE · VALIDATE</text>
</svg>
