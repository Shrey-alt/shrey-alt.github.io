<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="p-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#DDE5EC"/>
    </linearGradient>
    <linearGradient id="p-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFBFD"/>
    </linearGradient>
    <linearGradient id="p-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="p-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
    <marker id="p-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0EA5E9"/>
    </marker>
    <marker id="p-arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#p-bg)"/>

  <!-- Subtle dotted grid -->
  <g fill="#0F172A" fill-opacity="0.06">
    <circle cx="40" cy="40" r="1.2"/><circle cx="120" cy="40" r="1.2"/><circle cx="200" cy="40" r="1.2"/><circle cx="280" cy="40" r="1.2"/><circle cx="360" cy="40" r="1.2"/><circle cx="440" cy="40" r="1.2"/><circle cx="520" cy="40" r="1.2"/><circle cx="600" cy="40" r="1.2"/><circle cx="680" cy="40" r="1.2"/><circle cx="760" cy="40" r="1.2"/>
    <circle cx="40" cy="120" r="1.2"/><circle cx="120" cy="120" r="1.2"/><circle cx="200" cy="120" r="1.2"/><circle cx="280" cy="120" r="1.2"/><circle cx="360" cy="120" r="1.2"/><circle cx="440" cy="120" r="1.2"/><circle cx="520" cy="120" r="1.2"/><circle cx="600" cy="120" r="1.2"/><circle cx="680" cy="120" r="1.2"/><circle cx="760" cy="120" r="1.2"/>
    <circle cx="40" cy="200" r="1.2"/><circle cx="120" cy="200" r="1.2"/><circle cx="200" cy="200" r="1.2"/><circle cx="280" cy="200" r="1.2"/><circle cx="360" cy="200" r="1.2"/><circle cx="440" cy="200" r="1.2"/><circle cx="520" cy="200" r="1.2"/><circle cx="600" cy="200" r="1.2"/><circle cx="680" cy="200" r="1.2"/><circle cx="760" cy="200" r="1.2"/>
    <circle cx="40" cy="280" r="1.2"/><circle cx="120" cy="280" r="1.2"/><circle cx="200" cy="280" r="1.2"/><circle cx="280" cy="280" r="1.2"/><circle cx="360" cy="280" r="1.2"/><circle cx="440" cy="280" r="1.2"/><circle cx="520" cy="280" r="1.2"/><circle cx="600" cy="280" r="1.2"/><circle cx="680" cy="280" r="1.2"/><circle cx="760" cy="280" r="1.2"/>
    <circle cx="40" cy="360" r="1.2"/><circle cx="120" cy="360" r="1.2"/><circle cx="200" cy="360" r="1.2"/><circle cx="280" cy="360" r="1.2"/><circle cx="360" cy="360" r="1.2"/><circle cx="440" cy="360" r="1.2"/><circle cx="520" cy="360" r="1.2"/><circle cx="600" cy="360" r="1.2"/><circle cx="680" cy="360" r="1.2"/><circle cx="760" cy="360" r="1.2"/>
    <circle cx="40" cy="440" r="1.2"/><circle cx="120" cy="440" r="1.2"/><circle cx="200" cy="440" r="1.2"/><circle cx="280" cy="440" r="1.2"/><circle cx="360" cy="440" r="1.2"/><circle cx="440" cy="440" r="1.2"/><circle cx="520" cy="440" r="1.2"/><circle cx="600" cy="440" r="1.2"/><circle cx="680" cy="440" r="1.2"/><circle cx="760" cy="440" r="1.2"/>
    <circle cx="40" cy="520" r="1.2"/><circle cx="120" cy="520" r="1.2"/><circle cx="200" cy="520" r="1.2"/><circle cx="280" cy="520" r="1.2"/><circle cx="360" cy="520" r="1.2"/><circle cx="440" cy="520" r="1.2"/><circle cx="520" cy="520" r="1.2"/><circle cx="600" cy="520" r="1.2"/><circle cx="680" cy="520" r="1.2"/><circle cx="760" cy="520" r="1.2"/>
    <circle cx="40" cy="600" r="1.2"/><circle cx="120" cy="600" r="1.2"/><circle cx="200" cy="600" r="1.2"/><circle cx="280" cy="600" r="1.2"/><circle cx="360" cy="600" r="1.2"/><circle cx="440" cy="600" r="1.2"/><circle cx="520" cy="600" r="1.2"/><circle cx="600" cy="600" r="1.2"/><circle cx="680" cy="600" r="1.2"/><circle cx="760" cy="600" r="1.2"/>
    <circle cx="40" cy="680" r="1.2"/><circle cx="120" cy="680" r="1.2"/><circle cx="200" cy="680" r="1.2"/><circle cx="280" cy="680" r="1.2"/><circle cx="360" cy="680" r="1.2"/><circle cx="440" cy="680" r="1.2"/><circle cx="520" cy="680" r="1.2"/><circle cx="600" cy="680" r="1.2"/><circle cx="680" cy="680" r="1.2"/><circle cx="760" cy="680" r="1.2"/>
    <circle cx="40" cy="760" r="1.2"/><circle cx="120" cy="760" r="1.2"/><circle cx="200" cy="760" r="1.2"/><circle cx="280" cy="760" r="1.2"/><circle cx="360" cy="760" r="1.2"/><circle cx="440" cy="760" r="1.2"/><circle cx="520" cy="760" r="1.2"/><circle cx="600" cy="760" r="1.2"/><circle cx="680" cy="760" r="1.2"/><circle cx="760" cy="760" r="1.2"/>
  </g>

  <!-- Connection lines (drawn first so they sit behind screens) -->
  <g fill="none" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round">
    <!-- Screen 1 → Screen 2 -->
    <path d="M 270 320 C 320 320, 320 380, 380 380" marker-end="url(#p-arrow)"/>
    <!-- Screen 2 → Screen 3 -->
    <path d="M 580 380 C 640 380, 640 510, 590 510" marker-end="url(#p-arrow)"/>
    <!-- Screen 3 → back to Screen 1 (loop) -->
    <path d="M 280 510 C 200 510, 180 420, 200 360" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="6 6" marker-end="url(#p-arrow-light)"/>
  </g>

  <!-- Screen 1 (top-left) — Login -->
  <g transform="translate(80,140)" filter="url(#p-shadow)">
    <rect x="0" y="0" width="190" height="280" rx="20" fill="url(#p-screen)" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="68" y="14" width="54" height="6" rx="3" fill="#0F172A" opacity="0.12"/>
    <!-- Avatar circle -->
    <circle cx="95" cy="68" r="22" fill="url(#p-accent)" opacity="0.18"/>
    <circle cx="95" cy="62" r="9" fill="url(#p-accent)"/>
    <path d="M 80 86 Q 95 76, 110 86" stroke="url(#p-accent)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Heading -->
    <rect x="40" y="106" width="110" height="9" rx="3" fill="#0F172A" opacity="0.78"/>
    <rect x="55" y="122" width="80" height="6" rx="3" fill="#0F172A" opacity="0.32"/>
    <!-- Input fields -->
    <rect x="20" y="148" width="150" height="32" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="32" y="162" width="60" height="6" rx="2" fill="#0F172A" opacity="0.4"/>
    <rect x="20" y="188" width="150" height="32" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="32" y="202" width="48" height="6" rx="2" fill="#0F172A" opacity="0.4"/>
    <!-- CTA -->
    <rect x="20" y="232" width="150" height="32" rx="8" fill="url(#p-accent)"/>
    <rect x="80" y="245" width="30" height="6" rx="2" fill="#FFF"/>
  </g>

  <!-- Screen 2 (top-right) — Dashboard -->
  <g transform="translate(380,200)" filter="url(#p-shadow)">
    <rect x="0" y="0" width="200" height="320" rx="20" fill="url(#p-screen)" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="74" y="14" width="52" height="6" rx="3" fill="#0F172A" opacity="0.12"/>
    <!-- Header -->
    <rect x="18" y="40" width="80" height="10" rx="3" fill="#0F172A" opacity="0.8"/>
    <rect x="18" y="56" width="56" height="6" rx="2" fill="#0F172A" opacity="0.35"/>
    <circle cx="172" cy="50" r="14" fill="#F1F5F9"/>
    <!-- Stat card 1 -->
    <rect x="18" y="80" width="78" height="62" rx="10" fill="url(#p-accent)"/>
    <rect x="28" y="92" width="36" height="5" rx="2" fill="#FFF" opacity="0.65"/>
    <rect x="28" y="106" width="50" height="14" rx="3" fill="#FFF"/>
    <rect x="28" y="126" width="34" height="5" rx="2" fill="#FFF" opacity="0.55"/>
    <!-- Stat card 2 -->
    <rect x="104" y="80" width="78" height="62" rx="10" fill="#F1F5F9"/>
    <rect x="114" y="92" width="36" height="5" rx="2" fill="#0F172A" opacity="0.4"/>
    <rect x="114" y="106" width="50" height="14" rx="3" fill="#0F172A" opacity="0.85"/>
    <rect x="114" y="126" width="34" height="5" rx="2" fill="#34D399"/>
    <!-- Mini chart -->
    <rect x="18" y="156" width="164" height="72" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <polyline points="28,210 50,196 72,202 94,180 116,186 138,170 160,178 174,164" fill="none" stroke="url(#p-accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="174" cy="164" r="4" fill="url(#p-accent)"/>
    <!-- List rows -->
    <rect x="18" y="240" width="164" height="22" rx="6" fill="#F1F5F9"/>
    <circle cx="30" cy="251" r="5" fill="url(#p-accent)" opacity="0.6"/>
    <rect x="42" y="248" width="80" height="6" rx="2" fill="#0F172A" opacity="0.6"/>
    <rect x="18" y="270" width="164" height="22" rx="6" fill="#F1F5F9"/>
    <circle cx="30" cy="281" r="5" fill="#94A3B8"/>
    <rect x="42" y="278" width="64" height="6" rx="2" fill="#0F172A" opacity="0.6"/>
  </g>

  <!-- Screen 3 (bottom-centre) — Detail -->
  <g transform="translate(280,510)" filter="url(#p-shadow)">
    <rect x="0" y="0" width="310" height="180" rx="20" fill="url(#p-screen)" stroke="#CBD5E1" stroke-width="1"/>
    <!-- Title -->
    <rect x="20" y="22" width="110" height="10" rx="3" fill="#0F172A" opacity="0.78"/>
    <rect x="20" y="40" width="170" height="6" rx="2" fill="#0F172A" opacity="0.32"/>
    <!-- Two-column content -->
    <rect x="20" y="62" width="130" height="100" rx="10" fill="url(#p-accent)" opacity="0.92"/>
    <rect x="34" y="76" width="60" height="6" rx="2" fill="#FFF" opacity="0.7"/>
    <rect x="34" y="92" width="86" height="14" rx="3" fill="#FFF"/>
    <rect x="34" y="116" width="50" height="22" rx="11" fill="#FFF" opacity="0.22"/>
    <!-- Right list -->
    <rect x="160" y="62" width="130" height="22" rx="6" fill="#F1F5F9"/>
    <rect x="170" y="71" width="80" height="6" rx="2" fill="#0F172A" opacity="0.55"/>
    <rect x="160" y="90" width="130" height="22" rx="6" fill="#F1F5F9"/>
    <rect x="170" y="99" width="60" height="6" rx="2" fill="#0F172A" opacity="0.55"/>
    <rect x="160" y="118" width="130" height="22" rx="6" fill="#F1F5F9"/>
    <rect x="170" y="127" width="74" height="6" rx="2" fill="#0F172A" opacity="0.55"/>
    <rect x="160" y="146" width="130" height="22" rx="6" fill="url(#p-accent)" opacity="0.18"/>
    <rect x="170" y="155" width="56" height="6" rx="2" fill="#0284C7"/>
  </g>

  <!-- Connection labels -->
  <g font-family="DM Sans, sans-serif" font-size="11" font-weight="700" letter-spacing="1" fill="#0EA5E9">
    <text x="316" y="350">on tap</text>
    <text x="612" y="448">on submit</text>
  </g>

  <!-- Top-right label -->
  <text x="80" y="100" font-family="DM Sans, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#0F172A" opacity="0.58">PROTOTYPING</text>
  <line x1="80" y1="116" x2="240" y2="116" stroke="#0F172A" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Bottom signature -->
  <text x="80" y="740" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" letter-spacing="2" fill="#0F172A" opacity="0.45">FLOWS · STATES · MICRO-INTERACTIONS</text>
</svg>
