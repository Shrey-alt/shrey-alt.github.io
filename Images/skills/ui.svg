<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ui-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="50%" stop-color="#16213E"/>
      <stop offset="100%" stop-color="#0F1626"/>
    </linearGradient>
    <radialGradient id="ui-glow1" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ui-glow2" cx="0.85" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ui-card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="ui-card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="ui-card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <filter id="ui-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="ui-glass" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#ui-bg)"/>
  <rect width="800" height="800" fill="url(#ui-glow1)"/>
  <rect width="800" height="800" fill="url(#ui-glow2)"/>

  <!-- Subtle grid overlay -->
  <g stroke="#FFF" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
  </g>

  <!-- Phone frame (centre) -->
  <g filter="url(#ui-shadow)">
    <rect x="240" y="120" width="320" height="580" rx="44" fill="#0B1220" stroke="#FFF" stroke-opacity="0.08" stroke-width="1.5"/>
    <!-- Notch -->
    <rect x="360" y="138" width="80" height="14" rx="7" fill="#000"/>

    <!-- Screen content background -->
    <rect x="252" y="168" width="296" height="520" rx="32" fill="#13182A"/>

    <!-- Status bar -->
    <text x="276" y="194" font-family="DM Sans, sans-serif" font-size="12" font-weight="700" fill="#FFF" opacity="0.85">9:41</text>
    <g fill="#FFF" opacity="0.7">
      <rect x="488" y="186" width="14" height="9" rx="1.5"/>
      <rect x="506" y="186" width="14" height="9" rx="1.5"/>
      <rect x="524" y="184" width="20" height="11" rx="2"/>
    </g>

    <!-- Greeting -->
    <text x="276" y="234" font-family="DM Sans, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5" fill="#FFF" opacity="0.45">GOOD MORNING</text>
    <text x="276" y="262" font-family="DM Sans, sans-serif" font-size="22" font-weight="700" fill="#FFF">Aanya Sharma</text>

    <!-- Hero card (purple) -->
    <g>
      <rect x="276" y="288" width="248" height="120" rx="20" fill="url(#ui-card1)"/>
      <text x="296" y="320" font-family="DM Sans, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2" fill="#FFF" opacity="0.7">BALANCE</text>
      <text x="296" y="352" font-family="DM Sans, sans-serif" font-size="28" font-weight="700" fill="#FFF">₹ 24,580</text>
      <rect x="296" y="370" width="80" height="22" rx="11" fill="#FFF" opacity="0.18"/>
      <text x="336" y="385" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="10" font-weight="600" letter-spacing="0.5" fill="#FFF">+ 12.4%</text>
      <!-- Decorative orbit -->
      <circle cx="500" cy="318" r="42" fill="none" stroke="#FFF" stroke-opacity="0.15" stroke-width="1.5"/>
      <circle cx="500" cy="318" r="22" fill="#FFF" opacity="0.18"/>
      <circle cx="500" cy="318" r="8" fill="#FFF"/>
    </g>

    <!-- Quick actions row -->
    <g>
      <rect x="276" y="424" width="58" height="58" rx="14" fill="#FFF" opacity="0.08"/>
      <circle cx="305" cy="448" r="10" fill="url(#ui-card2)"/>
      <rect x="290" y="466" width="30" height="6" rx="2" fill="#FFF" opacity="0.5"/>

      <rect x="340" y="424" width="58" height="58" rx="14" fill="#FFF" opacity="0.08"/>
      <rect x="358" y="438" width="22" height="22" rx="5" fill="url(#ui-card3)"/>
      <rect x="354" y="466" width="30" height="6" rx="2" fill="#FFF" opacity="0.5"/>

      <rect x="404" y="424" width="58" height="58" rx="14" fill="#FFF" opacity="0.08"/>
      <path d="M 423 455 L 433 442 L 443 455 L 443 466 L 423 466 Z" fill="url(#ui-card1)"/>
      <rect x="418" y="466" width="30" height="6" rx="2" fill="#FFF" opacity="0.5"/>

      <rect x="468" y="424" width="58" height="58" rx="14" fill="#FFF" opacity="0.08"/>
      <circle cx="497" cy="450" r="11" fill="none" stroke="#FFF" stroke-opacity="0.55" stroke-width="2.2"/>
      <line x1="503" y1="456" x2="510" y2="463" stroke="#FFF" stroke-opacity="0.55" stroke-width="2.2" stroke-linecap="round"/>
      <rect x="482" y="466" width="30" height="6" rx="2" fill="#FFF" opacity="0.5"/>
    </g>

    <!-- Recent list -->
    <text x="276" y="514" font-family="DM Sans, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2" fill="#FFF" opacity="0.45">RECENT</text>

    <g>
      <rect x="276" y="528" width="248" height="56" rx="14" fill="#FFF" opacity="0.05"/>
      <circle cx="300" cy="556" r="14" fill="url(#ui-card3)"/>
      <rect x="324" y="544" width="100" height="9" rx="2" fill="#FFF" opacity="0.85"/>
      <rect x="324" y="560" width="70" height="7" rx="2" fill="#FFF" opacity="0.4"/>
      <text x="510" y="562" text-anchor="end" font-family="DM Sans, sans-serif" font-size="13" font-weight="700" fill="#FFF">- ₹240</text>
    </g>
    <g>
      <rect x="276" y="592" width="248" height="56" rx="14" fill="#FFF" opacity="0.05"/>
      <circle cx="300" cy="620" r="14" fill="url(#ui-card2)"/>
      <rect x="324" y="608" width="120" height="9" rx="2" fill="#FFF" opacity="0.85"/>
      <rect x="324" y="624" width="80" height="7" rx="2" fill="#FFF" opacity="0.4"/>
      <text x="510" y="626" text-anchor="end" font-family="DM Sans, sans-serif" font-size="13" font-weight="700" fill="#34D399">+ ₹820</text>
    </g>

    <!-- Bottom indicator -->
    <rect x="356" y="676" width="88" height="4" rx="2" fill="#FFF" opacity="0.4"/>
  </g>

  <!-- Floating colour swatch trio (top-right) -->
  <g transform="translate(620,160) rotate(8)" filter="url(#ui-shadow)">
    <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#ui-card1)"/>
    <rect x="0" y="76" width="64" height="64" rx="14" fill="url(#ui-card2)"/>
    <rect x="0" y="152" width="64" height="64" rx="14" fill="url(#ui-card3)"/>
  </g>

  <!-- Floating component chip (bottom-left) -->
  <g transform="translate(70,560) rotate(-6)" filter="url(#ui-shadow)">
    <rect x="0" y="0" width="160" height="56" rx="14" fill="#FFF" opacity="0.06"/>
    <rect x="0" y="0" width="160" height="56" rx="14" fill="none" stroke="#FFF" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="22" cy="28" r="8" fill="#34D399"/>
    <rect x="40" y="20" width="80" height="7" rx="2" fill="#FFF" opacity="0.85"/>
    <rect x="40" y="32" width="60" height="6" rx="2" fill="#FFF" opacity="0.45"/>
  </g>

  <!-- Top-left label -->
  <text x="80" y="100" font-family="DM Sans, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#FFF" opacity="0.55">USER INTERFACE</text>
  <line x1="80" y1="116" x2="240" y2="116" stroke="#FFF" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Bottom signature -->
  <text x="80" y="740" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" letter-spacing="2" fill="#FFF" opacity="0.35">COMPONENTS · TYPE · COLOUR</text>
</svg>
